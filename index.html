<body>

<!-- Floating side rail — populated by render.js, shown/hidden on scroll -->
<div class="rail-wrap">
  <nav class="rail" id="rail" aria-label="Sections"></nav>
</div>

<main class="page">
  <!-- About / hero -->
  <section data-sec="about">
    <div class="hero">
      <div class="photo" id="photo">photo</div>
      <div class="who">
        <h1 id="name"></h1>
        <div class="role-line" id="role-line"></div>
        <div class="link-row" id="link-row"></div>
      </div>
    </div>
    <div class="about-body" id="bio"></div>
  </section>

  <!-- News (hidden automatically if CV.news is empty) -->
  <section data-sec="news" id="section-news" hidden>
    <h2 class="section-title">News</h2>
    <div class="news-grid" id="news"></div>
  </section>

  <section data-sec="education">
    <h2 class="section-title">Education</h2>
    <div id="education"></div>
  </section>

  <section data-sec="publications">
    <h2 class="section-title">Publications</h2>
    <div class="pubs" id="publications"></div>
  </section>

  <section data-sec="research">
    <h2 class="section-title">Research Experience</h2>
    <div id="research"></div>
  </section>

  <section data-sec="work">
    <h2 class="section-title">Work Experience</h2>
    <div id="work"></div>
  </section>

  <section data-sec="teaching">
    <h2 class="section-title">Teaching Experience</h2>
    <div id="teaching"></div>
  </section>

  <section data-sec="service">
    <h2 class="section-title">Academic Service</h2>
    <div id="service"></div>
  </section>

  <footer>
    <span id="footer-copy"></span>
    <span id="footer-updated"></span>
  </footer>
</main>

<script src="data.js"></script>
<script>
/* ============================================================
   Render logic. Pulls from window.CV (see data.js).
   Edit data.js to change content; edit this only to change
   how sections render or to add a new section type.
   ============================================================ */
(function () {
  const CV = window.CV;
  const $ = (id) => document.getElementById(id);

  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  })[c]);

  // Inline formatting for prose fields. Escapes HTML first, then applies:
  //   **bold**, *italic*, __underline__, [text](url)
  // Newlines are preserved via CSS (white-space: pre-line) on .detail.
  const fmt = (s) => {
    if (s == null) return '';
    let out = esc(s);
    // Links first so the URL isn't mangled by bold/italic rules
    out = out.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, t, u) =>
      `<a href="${u}" target="_blank" rel="noreferrer">${t}</a>`);
    out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    out = out.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
    out = out.replace(/__([^_\n]+)__/g, '<u>$1</u>');
    return out;
  };

  /* ---- Header ---- */
  document.title = CV.tabTitle || `${CV.name} — Research`;
  $('name').textContent = CV.name;
  $('role-line').textContent = `${CV.role} ${CV.roleSeparator || '·'} ${CV.affiliation}`;

  // Photo: "auto" → probe assets/photo.{jpg,jpeg,png,webp} and use the first
  // one that exists; otherwise keep the stripe placeholder that's already
  // rendered in the markup. A literal path is used as-is.
  const loadPhoto = (src) => {
    const img = new Image();
    img.alt = CV.name;
    img.onload = () => { $('photo').innerHTML = ''; $('photo').appendChild(img); };
    img.src = src;
    return img;
  };
  if (CV.photo === 'auto') {
    const exts = ['jpg', 'jpeg', 'png', 'webp'];
    let i = 0;
    const tryNext = () => {
      if (i >= exts.length) return;
      const img = loadPhoto(`assets/photo.${exts[i++]}`);
      img.onerror = tryNext;
    };
    tryNext();
  } else if (CV.photo) {
    loadPhoto(CV.photo);
  }

  // Favicon: probe assets/favicon.{jpg,jpeg,png,webp}. When found, render
  // through a canvas with a circular clip so it appears round regardless
  // of source shape. Falls back to the raw file if canvas is tainted
  // (e.g. opened from file:// in some browsers).
  const setFavicon = (src) => {
    const img = new Image();
    img.onload = () => {
      const size = 128;
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const ctx = c.getContext('2d');
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      const s = Math.min(img.naturalWidth, img.naturalHeight);
      const sx = (img.naturalWidth - s) / 2;
      const sy = (img.naturalHeight - s) / 2;
      ctx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
      let link = document.querySelector('link[rel~="icon"]');
      if (!link) {
        link = document.createElement('link');
        link.rel = 'icon';
        document.head.appendChild(link);
      }
      try {
        link.type = 'image/png';
        link.href = c.toDataURL('image/png');
      } catch (_) {
        link.type = '';
        link.href = src;
      }
    };
    img.src = src;
    return img;
  };
  (() => {
    const exts = ['jpg', 'jpeg', 'png', 'webp'];
    let i = 0;
    const tryNext = () => {
      if (i >= exts.length) return;
      const img = setFavicon(`assets/favicon.${exts[i++]}`);
      img.onerror = tryNext;
    };
    tryNext();
  })();

  /* ---- Link row ---- */
  $('link-row').innerHTML = CV.links.map((l) => {
    const external = /^https?:/i.test(l.href);
    const attrs = external ? ' target="_blank" rel="noreferrer"' : '';
    return `<a href="${esc(l.href)}"${attrs}>${esc(l.label)}</a>`;
  }).join('');

  /* ---- About ---- */
  $('bio').innerHTML = (Array.isArray(CV.bio) ? CV.bio : [CV.bio])
    .filter(Boolean)
    .map((p) => `<p>${fmt(p)}</p>`)
    .join('');

  /* ---- News ---- */
  if (CV.news && CV.news.length) {
    $('section-news').hidden = false;
    $('news').innerHTML = CV.news.map((n) => `
      <div class="date">${esc(n.date)}</div>
      <div>${fmt(n.text)}</div>
    `).join('');
  }

  /* ---- Generic "Entry" rows (education / research / work / teaching / service) ---- */
  const entry = ({ left, title, sub, detail }) => `
    <div class="entry">
      <div class="left">${esc(left)}</div>
      <div>
        <div class="title">${fmt(title)}</div>
        ${sub ? `<div class="sub">${fmt(sub)}</div>` : ''}
        ${detail ? `<div class="detail">${fmt(detail)}</div>` : ''}
      </div>
    </div>
  `;

  $('education').innerHTML = CV.education.map((e) => entry({
    left: e.years, title: e.school, sub: e.degree, detail: e.detail,
  })).join('');

  $('research').innerHTML = CV.research.map((r) => entry({
    left: r.years, title: r.org, sub: r.role, detail: r.detail,
  })).join('');

  $('work').innerHTML = CV.work.map((w) => entry({
    left: w.years, title: w.org, sub: w.role, detail: w.detail,
  })).join('');

  $('teaching').innerHTML = CV.teaching.map((t) => entry({
    left: t.years, title: t.course, sub: `${t.role}, ${t.org}`, detail: t.detail,
  })).join('');

  $('service').innerHTML = CV.service.map((s) => entry({
    left: s.years, title: s.org, sub: s.role, detail: s.detail,
  })).join('');

  /* ---- Publications ---- */
  $('publications').innerHTML = CV.publications.map((p) => {
    const title = p.link
      ? `<a href="${esc(p.link)}" target="_blank" rel="noreferrer">${fmt(p.title)}</a>`
      : fmt(p.title);
    return `
      <div class="pub">
        <div class="pub-title">${title}</div>
        <div class="pub-authors">${fmt(p.authors)}</div>
        <div class="pub-venue">${fmt(p.venue)}</div>
      </div>
    `;
  }).join('');

  /* ---- Footer ---- */
  $('footer-copy').textContent = `© ${CV.footer.copyrightYear} ${CV.name}`;
  $('footer-updated').textContent = `Last updated ${CV.footer.lastUpdated}`;

  /* ---- Side rail: build links (only for visible sections) ---- */
  const sections = Array.from(document.querySelectorAll('section[data-sec]'))
    .filter((s) => !s.hidden);
  const labels = {
    about: 'About', news: 'News', education: 'Education',
    publications: 'Publications', research: 'Research', work: 'Work',
    teaching: 'Teaching', service: 'Service',
  };
  $('rail').innerHTML = sections.map((s) => {
    const id = s.dataset.sec;
    return `<a href="#${id}" data-target="${id}"><span class="tick"></span><span>${labels[id] || id}</span></a>`;
  }).join('');

  /* ---- Side rail: smooth-scroll on click ---- */
  $('rail').addEventListener('click', (e) => {
    const a = e.target.closest('a[data-target]');
    if (!a) return;
    e.preventDefault();
    const el = document.querySelector(`section[data-sec="${a.dataset.target}"]`);
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 32;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  });

  /* ---- Side rail: show-on-scroll + active-section highlight ---- */
  const rail = $('rail');
  const railLinks = Array.from(rail.querySelectorAll('a'));
  let hideTimer;

  const showRail = () => {
    rail.classList.add('visible');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => rail.classList.remove('visible'), 1500);
  };

  const computeActive = () => {
    const probeY = window.innerHeight * 0.28;
    let best = sections[0].dataset.sec;
    let bestDist = Infinity;
    for (const s of sections) {
      const top = s.getBoundingClientRect().top;
      if (top <= probeY) {
        const d = probeY - top;
        if (d < bestDist) { bestDist = d; best = s.dataset.sec; }
      }
    }
    // Snap to last section at the very bottom
    if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 4) {
      best = sections[sections.length - 1].dataset.sec;
    }
    for (const a of railLinks) {
      a.classList.toggle('active', a.dataset.target === best);
    }
  };

  window.addEventListener('scroll', () => { showRail(); computeActive(); }, { passive: true });
  window.addEventListener('wheel', showRail, { passive: true });
  window.addEventListener('touchmove', showRail, { passive: true });
  window.addEventListener('keydown', (e) => {
    if (['PageUp','PageDown','Home','End','ArrowUp','ArrowDown',' '].includes(e.key)) showRail();
  });
  rail.addEventListener('mouseenter', () => {
    clearTimeout(hideTimer);
    rail.classList.add('visible');
  });
  rail.addEventListener('mouseleave', () => {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => rail.classList.remove('visible'), 800);
  });

  computeActive();
})();
</script>
